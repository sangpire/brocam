name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Service Worker Cache Name
        env:
          CACHE_VERSION: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          sed -i "s/^const CACHE_NAME = \".*\";/const CACHE_NAME = \"web-cam-shell-${CACHE_VERSION}\";/" sw.js
          grep "^const CACHE_NAME" sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
