<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>brocam</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- 카메라 탭 -->
      <div id="tab-camera" class="tab-view active">
        <header class="app-header">
          <span class="app-title">brocam</span>
          <span id="status" class="status-badge">준비</span>
        </header>

        <div class="camera-area">
          <video
            id="camera"
            class="camera-preview"
            autoplay
            playsinline
            muted
            aria-label="카메라 미리보기"
          ></video>
          <div id="flash-overlay" class="flash-overlay"></div>
          <div id="camera-placeholder" class="camera-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <p>카메라를 시작하려면<br/>아래 버튼을 누르세요</p>
          </div>
        </div>

        <div class="shutter-bar">
          <div class="shutter-bar-side">
            <button id="last-photo-btn" type="button" class="last-photo-btn" aria-label="마지막 사진 보기" hidden>
              <img id="last-photo-thumb" src="" alt="마지막 사진" />
            </button>
          </div>
          <button id="shutter-btn" type="button" class="shutter-btn" aria-label="사진 촬영">
            <span class="shutter-btn-inner"></span>
          </button>
          <div class="shutter-bar-side">
            <button id="switch-camera-btn" type="button" class="icon-btn" aria-label="카메라 전환">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
                <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 갤러리 탭 -->
      <div id="tab-gallery" class="tab-view">
        <header class="app-header">
          <span class="app-title">갤러리</span>
          <span id="photo-count" class="status-badge">0장</span>
        </header>

        <div class="gallery-area">
          <p id="gallery-empty" class="gallery-empty">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>아직 저장된 사진이 없습니다</span>
          </p>
          <div id="gallery-grid" class="gallery-grid"></div>
        </div>
      </div>

      <!-- 사진 뷰어 -->
      <div id="photo-viewer" class="photo-viewer">
        <div class="viewer-header">
          <button id="viewer-close" type="button" class="icon-btn" aria-label="닫기">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <div class="viewer-actions">
            <button id="viewer-download" type="button" class="icon-btn" aria-label="다운로드">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
            <button id="viewer-delete" type="button" class="icon-btn delete" aria-label="삭제">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="viewer-body">
          <img id="viewer-image" src="" alt="사진 보기" />
        </div>
      </div>

      <!-- 하단 탭바 -->
      <nav class="tab-bar">
        <button type="button" class="tab-bar-item active" data-tab="camera">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>카메라</span>
        </button>
        <button type="button" class="tab-bar-item" data-tab="gallery">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>갤러리</span>
        </button>
      </nav>

      <canvas id="capture-canvas" aria-hidden="true"></canvas>
    </div>

    <script src="./db.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
