<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f62fe" />
    <title>brocam</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>카메라 미리보기</h1>
      <p id="status" class="status">카메라를 시작하려면 버튼을 누르세요.</p>

      <div class="preview-wrap">
        <video
          id="camera"
          class="preview"
          autoplay
          playsinline
          muted
          aria-label="카메라 미리보기"
        ></video>
      </div>

      <div class="controls">
        <button id="start-btn" type="button">카메라 시작</button>
        <button id="capture-btn" type="button" disabled>사진 캡처</button>
      </div>

      <canvas id="capture-canvas" aria-hidden="true"></canvas>

      <section id="gallery" class="gallery" aria-label="저장된 사진 갤러리">
        <h2>저장된 사진</h2>
        <p id="gallery-empty" class="gallery-empty">아직 저장된 사진이 없습니다.</p>
        <div id="gallery-grid" class="gallery-grid"></div>
      </section>
    </main>

    <script src="./db.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
