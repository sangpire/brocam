<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f62fe" />
    <title>Web Cam PWA - 2단계</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>카메라 미리보기</h1>
      <p id="status" class="status">카메라를 시작하려면 버튼을 누르세요.</p>

      <div class="preview-wrap">
        <video
          id="camera"
          class="preview"
          autoplay
          playsinline
          muted
          aria-label="카메라 미리보기"
        ></video>
      </div>

      <div class="controls">
        <button id="start-btn" type="button">카메라 시작</button>
        <button id="capture-btn" type="button" disabled>사진 캡처</button>
      </div>

      <canvas id="capture-canvas" aria-hidden="true"></canvas>

      <section id="capture-result" class="capture-result" aria-live="polite">
        <p id="capture-empty">아직 캡처한 사진이 없습니다.</p>
        <img id="captured-photo" alt="캡처한 사진" hidden />
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
